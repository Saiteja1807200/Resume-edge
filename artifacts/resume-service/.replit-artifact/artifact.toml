kind = "web"
previewPath = "/"
title = "Resume Writing Service"
version = "1.0.0"
id = "artifacts/resume-service"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19959

[services.development]
run = "pnpm --filter @workspace/resume-service run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-service", "run", "build" ]
publicDir = "artifacts/resume-service/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19959"
BASE_PATH = "/"
